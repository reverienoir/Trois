name: Trois
options:
  bundleIdPrefix: com.eruru
  developmentRegion: ja
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Trois:
    type: application
    platform: iOS
    sources:
      - path: Trois
    settings:
      base:
        INFOPLIST_FILE: Trois/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eruru.Trois
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    configFiles:
      Debug: APIKeys.xcconfig
      Release: APIKeys.xcconfig
    info:
      path: Trois/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSLocationWhenInUseUsageDescription: "近くの飲食店を提案するために現在地を使用します"
        NSLocationAlwaysAndWhenInUseUsageDescription: "近くの飲食店を提案するために現在地を使用します"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        HOTPEPPER_API_KEY: $(HOTPEPPER_API_KEY)
        CLAUDE_API_KEY: $(CLAUDE_API_KEY)
